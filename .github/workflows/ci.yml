name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  version-sync:
    name: Cargo.toml version == metainfo release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify versions are in sync
        run: python3 .github/workflows/scripts/check-version-sync.py
